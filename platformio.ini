; SignalK Instrument Panel for Waveshare ESP32-P4-WIFI6-Touch-LCD-4B
; 4" 720x720 IPS MIPI-DSI, GT911 touch, ST7703 display driver
;
; NOTE: PlatformIO ESP32-P4 support is maturing. If board ID fails,
; build directly with: idf.py build flash monitor

[env:esp32p4_signalk]
platform = espressif32
board = esp32p4dev
framework = espidf

board_build.mcu = esp32p4
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_upload.flash_size = 16MB

; Use custom partition table
board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DESP_UI_CONF_INCLUDE_SIMPLE
    -DBOARD_HAS_PSRAM

; IDF component manager handles esp-ui, BSP, websocket deps
; via main/idf_component.yml
